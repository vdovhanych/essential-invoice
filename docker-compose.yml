services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
      POSTGRES_DB: invoice
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  app:
    build: .
    environment:
      PORT: 3000
      DATABASE_URL: postgres://invoice:invoice@db:5432/invoice
      JWT_SECRET: change-me
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_POLL_INTERVAL_MINUTES: ${IMAP_POLL_INTERVAL_MINUTES:-5}
      BANK_EMAIL_SENDER_PATTERN: ${BANK_EMAIL_SENDER_PATTERN:-noreply@airbank.cz}
      BANK_TYPE: ${BANK_TYPE:-airbank}
    depends_on:
      - db
    ports:
      - "3000:3000"
volumes:
  postgres_data:
