version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: invoice
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://invoice:invoice@db:5432/invoice
      JWT_SECRET: change-me
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SMTP_FROM: ${SMTP_FROM}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_PORT: ${IMAP_PORT}
      IMAP_USERNAME: ${IMAP_USERNAME}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      IMAP_SENDER_PATTERN: ${IMAP_SENDER_PATTERN}
      IMAP_POLL_INTERVAL_SECONDS: ${IMAP_POLL_INTERVAL_SECONDS}
      ARES_BASE_URL: ${ARES_BASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:
