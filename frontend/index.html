<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="eInvoice" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- iOS splash screens - light -->
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-light.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-pro-max-light.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-15-light.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-15-pro-max-light.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-ipad-light.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (prefers-color-scheme: light)" />
    <!-- iOS splash screens - dark -->
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-dark.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-pro-max-dark.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-15-dark.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-iphone-15-pro-max-dark.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-ipad-dark.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (prefers-color-scheme: dark)" />
    <title>essentialInvoice</title>
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('theme-preference');
        var d = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
