<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="140" fill="url(#bg)"/>

  <!-- Back card -->
  <rect x="140" y="150" width="240" height="280" rx="28" fill="url(#card)" opacity="0.6"/>

  <!-- Middle card -->
  <rect x="120" y="130" width="240" height="280" rx="28" fill="url(#card)" opacity="0.8"/>

  <!-- Front card -->
  <rect x="100" y="110" width="240" height="280" rx="28" fill="white"/>

  <!-- Subtle invoice lines -->
  <rect x="130" y="170" width="140" height="10" rx="5" fill="#C4B5FD"/>
  <rect x="130" y="210" width="110" height="10" rx="5" fill="#C4B5FD"/>
  <rect x="130" y="250" width="120" height="10" rx="5" fill="#C4B5FD"/>

  <!-- Accent dot (processed) -->
  <circle cx="300" cy="330" r="10" fill="#7C3AED"/>
</svg>
