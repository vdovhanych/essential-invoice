# -- Service account configuration
# Useful for IAM Roles for Service Accounts (IRSA) on AWS or Workload Identity on GCP
serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: true
  # -- ServiceAccount name (auto-generated if empty)
  name: ""
  # -- Annotations to add to the ServiceAccount (e.g. eks.amazonaws.com/role-arn)
  annotations: {}

# -- Backend (Express API) configuration
backend:
  # -- Backend container image
  image:
    repository: ghcr.io/vdovhanych/essential-invoice/backend
    # -- Override with a specific version tag for production (e.g. "1.0.0")
    tag: latest
    pullPolicy: IfNotPresent

  # -- Number of backend replicas
  replicas: 1

  # -- Backend service port
  port: 3001

  # -- Backend service configuration
  service:
    # -- Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP

  # -- Deployment strategy
  strategy: {}
    # type: RollingUpdate
    # rollingUpdate:
    #   maxSurge: 1
    #   maxUnavailable: 0

  # -- Additional pod annotations (e.g. for Prometheus scraping)
  podAnnotations: {}

  # -- Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # -- Container-level security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # -- Resource requests and limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # -- Environment variables for the backend
  env:
    NODE_ENV: production
    # -- Email polling interval in milliseconds (default: 5 minutes)
    EMAIL_POLLING_INTERVAL: "300000"
    # -- CORS allowed origin(s), comma-separated. With ingress (same-origin),
    # -- CORS is not needed and this value is ignored by browsers.
    # -- For cross-origin setups, set to your frontend URL (e.g. "https://invoices.example.com").
    CORS_ORIGIN: "*"

  # -- Additional environment variables as a list (for secrets, configmaps, etc.)
  # Example:
  #   - name: SMTP_HOST
  #     value: "smtp.example.com"
  #   - name: SMTP_PASSWORD
  #     valueFrom:
  #       secretKeyRef:
  #         name: smtp-secret
  #         key: password
  extraEnv: []

  # -- Additional envFrom sources (mount entire ConfigMaps/Secrets as env vars)
  # Example:
  #   - secretRef:
  #       name: smtp-credentials
  #   - configMapRef:
  #       name: app-config
  extraEnvFrom: []

  # -- Horizontal Pod Autoscaler configuration
  autoscaling:
    # -- Enable HPA for backend
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilization percentage (optional)
    # targetMemoryUtilizationPercentage: 80

  # -- Pod Disruption Budget configuration
  pdb:
    # -- Enable PDB for backend
    enabled: false
    # -- Minimum number of pods that must be available
    minAvailable: 1
    # maxUnavailable: 1

  # -- Node selector for backend pods
  nodeSelector: {}

  # -- Tolerations for backend pods
  tolerations: []

  # -- Affinity rules for backend pods
  affinity: {}

# -- Frontend (Nginx + React SPA) configuration
frontend:
  # -- Frontend container image
  image:
    repository: ghcr.io/vdovhanych/essential-invoice/frontend
    # -- Override with a specific version tag for production (e.g. "1.0.0")
    tag: latest
    pullPolicy: IfNotPresent

  # -- Number of frontend replicas
  replicas: 1

  # -- Frontend service port
  port: 80

  # -- Frontend service configuration
  service:
    # -- Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP

  # -- Deployment strategy
  strategy: {}
    # type: RollingUpdate
    # rollingUpdate:
    #   maxSurge: 1
    #   maxUnavailable: 0

  # -- Additional pod annotations
  podAnnotations: {}

  # -- Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101

  # -- Container-level security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # -- Resource requests and limits
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  # -- Horizontal Pod Autoscaler configuration
  autoscaling:
    # -- Enable HPA for frontend
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 80

  # -- Pod Disruption Budget configuration
  pdb:
    # -- Enable PDB for frontend
    enabled: false
    # -- Minimum number of pods that must be available
    minAvailable: 1

  # -- Node selector for frontend pods
  nodeSelector: {}

  # -- Tolerations for frontend pods
  tolerations: []

  # -- Affinity rules for frontend pods
  affinity: {}

# -- Ingress configuration
ingress:
  # -- Enable ingress resource
  enabled: false

  # -- Ingress class name (e.g. "nginx", "traefik")
  className: ""

  # -- Ingress annotations (e.g. cert-manager, nginx config)
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"

  # -- Hostname for the ingress
  host: ""

  # -- Path type for ingress rules (Prefix, Exact, ImplementationSpecific)
  pathType: Prefix

  # -- TLS configuration
  tls: []
  #  - secretName: essential-invoice-tls
  #    hosts:
  #      - invoice.example.com

# -- REQUIRED: JWT secret for backend authentication
# Generate with: openssl rand -base64 32
jwtSecret: ""

# -- Use an existing Kubernetes secret for JWT (and optional external DB credentials)
# The secret must contain: JWT_SECRET
# When postgresql.enabled=false (external DB), it must also contain: DB_PASSWORD
# When postgresql.enabled=true, DB password is read from the Bitnami subchart secret (key: postgres-password)
existingSecret: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the full name of resources
fullnameOverride: ""

# -- Override the chart name
nameOverride: ""

# -- PostgreSQL subchart configuration (Bitnami)
# See: https://github.com/bitnami/charts/tree/main/bitnami/postgresql
postgresql:
  # -- Enable the PostgreSQL subchart
  enabled: true

  auth:
    # -- PostgreSQL database name
    database: essential_invoice
    # -- PostgreSQL username
    username: postgres
    # -- REQUIRED: PostgreSQL password (unless using auth.existingSecret)
    password: ""
    # -- Use an existing secret for PostgreSQL credentials
    # The secret should contain key: postgres-password
    existingSecret: ""

  primary:
    persistence:
      # -- Enable persistent storage for PostgreSQL
      enabled: true
      # -- Storage size for PostgreSQL PVC
      size: 5Gi

  # -- External database connection (only used when postgresql.enabled=false)
  # Set postgresql.enabled=false and configure these:
  external:
    host: ""
    port: 5432
    database: essential_invoice
    username: postgres
    # -- Password for external database (or use existingSecret)
    password: ""
