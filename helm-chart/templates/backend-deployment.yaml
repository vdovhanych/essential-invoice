apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "essential-invoice.backend.serviceName" . }}
  labels:
    {{- include "essential-invoice.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "essential-invoice.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "essential-invoice.backend.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: NODE_ENV
              value: {{ .Values.backend.env.NODE_ENV | quote }}
            - name: EMAIL_POLLING_INTERVAL
              value: {{ .Values.backend.env.EMAIL_POLLING_INTERVAL | quote }}
            - name: DB_HOST
              value: {{ include "essential-invoice.databaseHost" . | quote }}
            - name: DB_PORT
              value: {{ include "essential-invoice.databasePort" . | quote }}
            - name: DB_NAME
              value: {{ include "essential-invoice.databaseName" . | quote }}
            - name: DB_USER
              value: {{ include "essential-invoice.databaseUser" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "essential-invoice.databaseSecretName" . }}
                  key: {{ include "essential-invoice.databaseSecretKey" . }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "essential-invoice.secretName" . }}
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              value: "*"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
