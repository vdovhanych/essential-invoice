apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "essential-invoice.backend.serviceName" . }}
  labels:
    {{- include "essential-invoice.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  {{- with .Values.backend.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "essential-invoice.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "essential-invoice.backend.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "essential-invoice.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "essential-invoice.databaseHost" . }} {{ include "essential-invoice.databasePort" . }}; do
                echo "Waiting for database..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: NODE_ENV
              value: {{ .Values.backend.env.NODE_ENV | quote }}
            - name: EMAIL_POLLING_INTERVAL
              value: {{ .Values.backend.env.EMAIL_POLLING_INTERVAL | quote }}
            - name: DB_HOST
              value: {{ include "essential-invoice.databaseHost" . | quote }}
            - name: DB_PORT
              value: {{ include "essential-invoice.databasePort" . | quote }}
            - name: DB_NAME
              value: {{ include "essential-invoice.databaseName" . | quote }}
            - name: DB_USER
              value: {{ include "essential-invoice.databaseUser" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "essential-invoice.databaseSecretName" . }}
                  key: {{ include "essential-invoice.databaseSecretKey" . }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "essential-invoice.secretName" . }}
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              value: {{ .Values.backend.env.CORS_ORIGIN | quote }}
            {{- if .Values.backend.env.FRONTEND_URL }}
            - name: FRONTEND_URL
              value: {{ .Values.backend.env.FRONTEND_URL | quote }}
            {{- end }}
            {{- if .Values.backend.globalSmtp.host }}
            - name: GLOBAL_SMTP_HOST
              value: {{ .Values.backend.globalSmtp.host | quote }}
            - name: GLOBAL_SMTP_PORT
              value: {{ .Values.backend.globalSmtp.port | quote }}
            - name: GLOBAL_SMTP_USER
              value: {{ .Values.backend.globalSmtp.user | quote }}
            - name: GLOBAL_SMTP_PASSWORD
              value: {{ .Values.backend.globalSmtp.password | quote }}
            - name: GLOBAL_SMTP_SECURE
              value: {{ .Values.backend.globalSmtp.secure | quote }}
            - name: GLOBAL_SMTP_FROM_EMAIL
              value: {{ .Values.backend.globalSmtp.fromEmail | quote }}
            - name: GLOBAL_SMTP_FROM_NAME
              value: {{ .Values.backend.globalSmtp.fromName | quote }}
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.backend.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
