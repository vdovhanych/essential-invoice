{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "essential-invoice.fullname" . }}
  labels:
    {{- include "essential-invoice.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ required "jwtSecret is required when existingSecret is not set" .Values.jwtSecret | b64enc | quote }}
  ENCRYPTION_KEY: {{ required "encryptionKey is required when existingSecret is not set. Generate with: openssl rand -hex 32" .Values.encryptionKey | b64enc | quote }}
  {{- if not .Values.postgresql.enabled }}
  DB_PASSWORD: {{ required "postgresql.external.password is required when using an external database and existingSecret is not set" .Values.postgresql.external.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.backend.globalSmtp.password }}
  GLOBAL_SMTP_PASSWORD: {{ .Values.backend.globalSmtp.password | b64enc | quote }}
  {{- end }}
{{- end }}
