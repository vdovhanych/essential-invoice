services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: essential-invoice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-essential_invoice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-essential_invoice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: ghcr.io/vdovhanych/essential-invoice/backend:${IMAGE_TAG:-latest}
    container_name: essential-invoice-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3001}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-essential_invoice}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-aee02347fb6401e6d1c5d3c068d1a2f2873cd7263629a297abf6b999bb568068}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      EMAIL_POLLING_INTERVAL: ${EMAIL_POLLING_INTERVAL:-600}
      RECURRING_INVOICE_INTERVAL: ${RECURRING_INVOICE_INTERVAL:-86400}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GLOBAL_SMTP_HOST: ${GLOBAL_SMTP_HOST:-}
      GLOBAL_SMTP_PORT: ${GLOBAL_SMTP_PORT:-587}
      GLOBAL_SMTP_USER: ${GLOBAL_SMTP_USER:-}
      GLOBAL_SMTP_PASSWORD: ${GLOBAL_SMTP_PASSWORD:-}
      GLOBAL_SMTP_SECURE: ${GLOBAL_SMTP_SECURE:-false}
      GLOBAL_SMTP_FROM_EMAIL: ${GLOBAL_SMTP_FROM_EMAIL:-}
      GLOBAL_SMTP_FROM_NAME: ${GLOBAL_SMTP_FROM_NAME:-essentialInvoice}

  # Frontend
  frontend:
    image: ghcr.io/vdovhanych/essential-invoice/frontend:${IMAGE_TAG:-latest}
    container_name: essential-invoice-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:

networks:
  default:
    name: essential-invoice-network
